<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Craft - ATS Resume Optimizer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Striped background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    45deg,
                    #000000,
                    #000000 20px,
                    #0a0a0a 20px,
                    #0a0a0a 40px
                );
            z-index: -1;
        }

        .landing-container {
            text-align: center;
            max-width: 900px;
            padding: 40px;
        }

        /* Animated Logo */
        .logo-animated {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 6rem;
            color: #FFD700;
            letter-spacing: 20px;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeInExpand 1.5s ease-out forwards;
        }

        @keyframes fadeInExpand {
            0% {
                opacity: 0;
                letter-spacing: 5px;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                letter-spacing: 20px;
                transform: scale(1);
            }
        }

        /* Tagline */
        .tagline {
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            color: #ffffff;
            line-height: 1.8;
            margin-bottom: 15px;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.8s forwards;
        }

        /* Catchphrase */
        .catchphrase {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: #FFD700;
            letter-spacing: 3px;
            margin-bottom: 60px;
            opacity: 0;
            animation: fadeInUp 1s ease-out 1.2s forwards;
            text-shadow: 2px 2px 8px rgba(255, 215, 0, 0.3);
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Buttons Container */
        .cta-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            opacity: 0;
            animation: fadeInUp 1s ease-out 1.6s forwards;
        }

        .btn-cta {
            padding: 20px 50px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: 4px solid #000000;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            position: relative;
            overflow: hidden;
        }

        .btn-cta::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn-cta:hover::before {
            left: 100%;
        }

        .btn-login {
            background: #FFD700;
            color: #000000;
            border-color: #FFD700;
        }

        .btn-login:hover {
            background: #000000;
            color: #FFD700;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        }

        .btn-signup {
            background: transparent;
            color: #FFD700;
            border-color: #FFD700;
        }

        .btn-signup:hover {
            background: #FFD700;
            color: #000000;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        }

        /* Decorative Elements */
        .decorative-line {
            width: 80px;
            height: 4px;
            background: #FFD700;
            margin: 40px auto;
            opacity: 0;
            animation: expandLine 1s ease-out 2s forwards;
        }

        @keyframes expandLine {
            0% {
                opacity: 0;
                width: 0;
            }
            100% {
                opacity: 1;
                width: 80px;
            }
        }

        /* Footer Note */
        .footer-note {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: #666666;
            opacity: 0;
            animation: fadeIn 1s ease-out 2.5s forwards;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo-animated {
                font-size: 3.5rem;
                letter-spacing: 10px;
            }

            .tagline {
                font-size: 0.9rem;
            }

            .catchphrase {
                font-size: 1.5rem;
            }

            .cta-buttons {
                flex-direction: column;
                gap: 15px;
            }

            .btn-cta {
                width: 100%;
                padding: 18px 40px;
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .logo-animated {
                font-size: 2.5rem;
                letter-spacing: 5px;
            }

            @keyframes fadeInExpand {
                0% {
                    opacity: 0;
                    letter-spacing: 2px;
                    transform: scale(0.8);
                }
                100% {
                    opacity: 1;
                    letter-spacing: 5px;
                    transform: scale(1);
                }
            }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <h1 class="logo-animated">RESUME CRAFT</h1>
        
        <p class="tagline">
            A tool designed to generate your resume as per the job description<br>
            of your dream role and get you in there for the interview.
        </p>
        
        <div class="decorative-line"></div>
        
        <h2 class="catchphrase">Ghost the bots, get the slots</h2>
        
        <div class="cta-buttons">
            <a href="/auth.html?tab=login" class="btn-cta btn-login">Login</a>
            <a href="/auth.html?tab=signup" class="btn-cta btn-signup">Sign Up</a>
        </div>
        
        <p class="footer-note">100% Free • Built with 💚 to help job seekers succeed</p>
    </div>
</body>
</html>
