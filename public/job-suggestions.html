<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Suggestions - Resume Craft</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(255,215,0,.03) 35px, rgba(255,215,0,.03) 70px);
            color: #ffffff;
            min-height: 100vh;
        }
        header {
            background: #000000;
            padding: 30px 50px;
            border-bottom: 4px solid #FFD700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            color: #FFD700;
            letter-spacing: 4px;
        }
        .btn {
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            padding: 12px 25px;
            border: 3px solid #FFD700;
            background: transparent;
            color: #FFD700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { background: #FFD700; color: #000000; }
        .container { max-width: 1400px; margin: 50px auto; padding: 0 50px; }
        .page-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            color: #FFD700;
            margin-bottom: 10px;
        }
        .loading {
            text-align: center;
            padding: 100px 20px;
            font-family: 'Space Mono', monospace;
            color: #FFD700;
        }
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #FFD700;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .skills-detected {
            background: #1a1a1a;
            border: 4px solid #333;
            padding: 25px;
            margin-bottom: 40px;
        }
        .skills-detected h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            color: #FFD700;
            margin-bottom: 15px;
        }
        .skills-tags { display: flex; flex-wrap: wrap; gap: 10px; }
        .skill-tag {
            background: #FFD700;
            color: #000000;
            padding: 8px 15px;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .jobs-grid { display: grid; gap: 30px; }
        .job-card {
            background: #1a1a1a;
            border: 4px solid #333;
            padding: 30px;
            transition: all 0.3s;
        }
        .job-card:hover {
            border-color: #FFD700;
            transform: translateX(5px);
        }
        .job-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: #FFD700;
            margin-bottom: 10px;
        }
        .job-company {
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 15px;
            font-weight: 700;
        }
        .job-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            color: #999;
        }
        .job-description {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #ccc;
            margin-bottom: 20px;
        }
        .job-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .job-skill {
            background: transparent;
            border: 2px solid #666;
            color: #999;
            padding: 5px 12px;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
        }
        .job-actions { display: flex; gap: 15px; }
        .btn-primary {
            background: #FFD700;
            color: #000000;
        }
        .btn-primary:hover {
            background: transparent;
            color: #FFD700;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">RESUME CRAFT</div>
        <a href="/app.html" class="btn">← Back to Resume</a>
    </header>

    <div class="container">
        <h1 class="page-title">JOB SUGGESTIONS FOR YOU</h1>
        <p style="font-family: 'Space Mono', monospace; color: #999; margin-bottom: 40px;">Real-time job openings matching your resume skills</p>

        <div id="loadingSection" class="loading">
            <div class="spinner"></div>
            Analyzing your resume and finding matching jobs...
        </div>

        <div id="jobsSection" style="display: none;">
            <div class="skills-detected">
                <h3>📊 Skills Detected From Your Resume</h3>
                <div class="skills-tags" id="skillsTags"></div>
            </div>
            <div class="jobs-grid" id="jobsGrid"></div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            const resume = sessionStorage.getItem('generatedResume');
            if (!resume) {
                alert('No resume found');
                window.location.href = '/app.html';
                return;
            }

            try {
                const response = await fetch('/api/suggest-jobs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resume })
                });

                const data = await response.json();
                displaySkills(data.skills);
                displayJobs(data.jobs);

                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('jobsSection').style.display = 'block';
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to load jobs');
                window.location.href = '/app.html';
            }
        });

        function displaySkills(skills) {
            document.getElementById('skillsTags').innerHTML = skills.map(s => 
                `<div class="skill-tag">${s}</div>`
            ).join('');
        }

        function displayJobs(jobs) {
            document.getElementById('jobsGrid').innerHTML = jobs.map(job => `
                <div class="job-card">
                    <div class="job-title">${job.title}</div>
                    <div class="job-company">${job.company}</div>
                    <div class="job-meta">
                        <span>📍 ${job.location}</span>
                        <span>💼 ${job.experience}</span>
                        ${job.salary ? `<span>💰 ${job.salary}</span>` : ''}
                    </div>
                    <div class="job-description">${job.description}</div>
                    <div class="job-skills">
                        ${job.skills.map(s => `<div class="job-skill">${s}</div>`).join('')}
                    </div>
                    <div class="job-actions">
                        <a href="${job.link}" target="_blank" class="btn btn-primary">Apply Now →</a>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
